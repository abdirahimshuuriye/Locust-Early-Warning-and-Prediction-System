{% extends "base.html" %}

{% block content %}

<h1>Activity Logs</h1>

<div class="section">

    <h2>System Activity History</h2>

    <table class="report-table">

        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Activity</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>

            {% for row in logs %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
