{% extends "base.html" %}

{% block content %}
<h1>Feedback Management</h1>

<div class="section">
    <h2>User Feedbacks</h2>

    <table class="report-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for feedback in feedbacks %}
            <tr>
                <td>{{ feedback[0] }}</td>
                <td>{{ feedback[1] }}</td>
                <td>{{ feedback[2] }}</td>
                <td>{{ feedback[3] }}</td>
                <td>{{ feedback[4] }}</td>
                <td>
                    <a href="/delete-feedback/{{ feedback[0] }}"
                       class="btn"
                       onclick="return confirm('Delete this feedback?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
