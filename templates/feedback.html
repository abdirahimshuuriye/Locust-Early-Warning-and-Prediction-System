{% extends "base.html" %}

{% block content %}
<h1>Feedback</h1>

<div class="section">
    <h2>Send Feedback</h2>

    {% if success %}
        <p style="color: green; font-weight: bold;">{{ success }}</p>
    {% endif %}

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="POST" class="prediction-form">
        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ session['full_name'] }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ session['email'] }}" required>

        <label>Message</label>
        <textarea name="message" rows="6" placeholder="Write your feedback here..." required></textarea>

        <br><br>

        <button type="submit" class="btn">Submit Feedback</button>
    </form>
</div>
{% endblock %}
